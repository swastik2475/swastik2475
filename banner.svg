  <circle cx="1000" cy="45" r="3.5" fill="#00d9ff" opacity="0.55"/>
  <circle cx="1000" cy="100" r="3.5" fill="#00d9ff" opacity="0.55"/>
  <circle cx="1000" cy="155" r="3.5" fill="#00d9ff" opacity="0.55"/>
  <circle cx="1070" cy="35" r="3.5" fill="#7c3aed" opacity="0.75"/>
  <circle cx="1070" cy="80" r="3.5" fill="#7c3aed" opacity="0.75"/>
  <circle cx="1070" cy="125" r="3.5" fill="#7c3aed" opacity="0.75"/>
  <circle cx="1070" cy="165" r="3.5" fill="#7c3aed" opacity="0.75"/>
  <circle cx="1140" cy="60" r="3.5" fill="#00d9ff" opacity="0.65"/>
  <circle cx="1140" cy="100" r="3.5" fill="#00d9ff" opacity="0.65"/>
  <circle cx="1140" cy="150" r="3.5" fill="#00d9ff" opacity="0.65"/>

  <!-- Code snippets floating -->
  <text x="258" y="30" font-family="monospace" font-size="10" fill="#00d9ff" opacity="0.22">model.fit(X_train)</text>
  <text x="242" y="178" font-family="monospace" font-size="10" fill="#7c3aed" opacity="0.22">import torch</text>
  <text x="810" y="30" font-family="monospace" font-size="10" fill="#7c3aed" opacity="0.22">retriever.search(query)</text>
  <text x="848" y="178" font-family="monospace" font-size="10" fill="#00d9ff" opacity="0.22">cv2.detect(frame)</text>

  <!-- Binary noise -->
  <text x="308" y="78" font-family="monospace" font-size="8" fill="#ffffff" opacity="0.05">10110100</text>
  <text x="308" y="148" font-family="monospace" font-size="8" fill="#ffffff" opacity="0.05">01001011</text>
  <text x="862" y="78" font-family="monospace" font-size="8" fill="#ffffff" opacity="0.05">11010010</text>
  <text x="862" y="148" font-family="monospace" font-size="8" fill="#ffffff" opacity="0.05">00110101</text>

  <!-- Glow rect behind name -->
  <rect x="300" y="40" width="600" height="120" fill="url(#nameGlow)"/>

  <!-- Accent lines flanking name -->
  <line x1="420" y1="65" x2="780" y2="65" stroke="#00d9ff" stroke-width="0.6" opacity="0.35"/>
  <line x1="420" y1="142" x2="780" y2="142" stroke="#00d9ff" stroke-width="0.6" opacity="0.35"/>

  <!-- Name -->
  <text x="600" y="127" font-family="'Segoe UI', Arial, sans-serif" font-size="74" font-weight="700"
    fill="url(#nameGrad)" text-anchor="middle" letter-spacing="-2" filter="url(#glow)">Swastik</text>

  <!-- Wave footer -->
  <path d="M0 188 Q200 175 400 185 Q600 195 800 182 Q1000 169 1200 184 L1200 200 L0 200 Z" fill="#0a1628" opacity="0.5"/>
</svg>
