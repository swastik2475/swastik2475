<svg width="900" height="140" viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00d9ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="140" fill="#0d1117"/>

  <!-- Grid dots -->
  <g opacity="0.12">
    <circle cx="30" cy="20" r="1" fill="#00d9ff"/>
    <circle cx="60" cy="20" r="1" fill="#00d9ff"/>
    <circle cx="90" cy="20" r="1" fill="#00d9ff"/>
    <circle cx="120" cy="20" r="1" fill="#00d9ff"/>
    <circle cx="150" cy="20" r="1" fill="#00d9ff"/>
    <circle cx="180" cy="20" r="1" fill="#00d9ff"/>
    <circle cx="750" cy="20" r="1" fill="#7c3aed"/>
    <circle cx="780" cy="20" r="1" fill="#7c3aed"/>
    <circle cx="810" cy="20" r="1" fill="#7c3aed"/>
    <circle cx="840" cy="20" r="1" fill="#7c3aed"/>
    <circle cx="870" cy="20" r="1" fill="#7c3aed"/>
    <circle cx="30" cy="50" r="1" fill="#00d9ff"/>
    <circle cx="60" cy="50" r="1" fill="#00d9ff"/>
    <circle cx="90" cy="50" r="1" fill="#00d9ff"/>
    <circle cx="750" cy="50" r="1" fill="#7c3aed"/>
    <circle cx="780" cy="50" r="1" fill="#7c3aed"/>
    <circle cx="810" cy="50" r="1" fill="#7c3aed"/>
    <circle cx="840" cy="50" r="1" fill="#7c3aed"/>
    <circle cx="870" cy="50" r="1" fill="#7c3aed"/>
    <circle cx="30" cy="80" r="1" fill="#00d9ff"/>
    <circle cx="60" cy="80" r="1" fill="#00d9ff"/>
    <circle cx="750" cy="80" r="1" fill="#7c3aed"/>
    <circle cx="780" cy="80" r="1" fill="#7c3aed"/>
    <circle cx="810" cy="80" r="1" fill="#7c3aed"/>
    <circle cx="30" cy="110" r="1" fill="#00d9ff"/>
    <circle cx="60" cy="110" r="1" fill="#00d9ff"/>
    <circle cx="810" cy="110" r="1" fill="#7c3aed"/>
    <circle cx="840" cy="110" r="1" fill="#7c3aed"/>
    <circle cx="870" cy="110" r="1" fill="#7c3aed"/>
  </g>

  <!-- Circuit lines left -->
  <g opacity="0.2" stroke="#00d9ff" stroke-width="1" fill="none">
    <polyline points="0,35 80,35 80,65 140,65"/>
    <circle cx="80" cy="35" r="3" fill="#00d9ff" opacity="0.5"/>
    <circle cx="140" cy="65" r="3" fill="#00d9ff" opacity="0.5"/>
    <polyline points="0,90 50,90 50,110 110,110"/>
    <circle cx="50" cy="90" r="3" fill="#00d9ff" opacity="0.5"/>
  </g>

  <!-- Circuit lines right -->
  <g opacity="0.2" stroke="#7c3aed" stroke-width="1" fill="none">
    <polyline points="900,40 820,40 820,70 760,70"/>
    <circle cx="820" cy="40" r="3" fill="#7c3aed" opacity="0.5"/>
    <circle cx="760" cy="70" r="3" fill="#7c3aed" opacity="0.5"/>
    <polyline points="900,95 850,95 850,115 790,115"/>
    <circle cx="850" cy="95" r="3" fill="#7c3aed" opacity="0.5"/>
  </g>

  <!-- Code snippets left (subtle) -->
  <text x="18" y="128" font-family="JetBrains Mono, monospace" font-size="9" fill="#00d9ff" opacity="0.18">model.train()</text>
  <text x="18" y="140" font-family="JetBrains Mono, monospace" font-size="9" fill="#00d9ff" opacity="0.12">yolo.detect()</text>

  <!-- Code snippets right -->
  <text x="720" y="128" font-family="JetBrains Mono, monospace" font-size="9" fill="#7c3aed" opacity="0.18">rag.retrieve()</text>
  <text x="735" y="140" font-family="JetBrains Mono, monospace" font-size="9" fill="#7c3aed" opacity="0.12">llm.generate()</text>

  <!-- Top accent line -->
  <rect x="0" y="0" width="900" height="2" fill="url(#line1)"/>

  <!-- Bottom accent line -->
  <rect x="0" y="138" width="900" height="2" fill="url(#line1)"/>

  <!-- Main name text -->
  <text x="450" y="68" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="38" font-weight="700" fill="white" filter="url(#glow)">Swastik Sharma</text>

  <!-- Subtitle -->
  <text x="450" y="98" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#00d9ff" letter-spacing="2">AI Engineer  ·  Computer Vision  ·  RAG Systems  ·  LLM</text>

  <!-- Small tag -->
  <rect x="380" y="110" width="140" height="18" rx="4" fill="#7c3aed" opacity="0.2"/>
  <text x="450" y="122" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#7c3aed">BIT Mesra · Class of 2027</text>
</svg>
