  <g stroke="#7c3aed" stroke-width="0.6" opacity="0.12">
    <line x1="1000" y1="45" x2="1070" y2="35"/>
    <line x1="1000" y1="45" x2="1070" y2="80"/>
    <line x1="1000" y1="100" x2="1070" y2="35"/>
    <line x1="1000" y1="100" x2="1070" y2="80"/>
    <line x1="1000" y1="100" x2="1070" y2="125"/>
    <line x1="1000" y1="100" x2="1070" y2="165"/>
    <line x1="1000" y1="155" x2="1070" y2="125"/>
    <line x1="1000" y1="155" x2="1070" y2="165"/>
    <line x1="1070" y1="35" x2="1140" y2="60"/>
    <line x1="1070" y1="80" x2="1140" y2="60"/>
    <line x1="1070" y1="80" x2="1140" y2="100"/>
    <line x1="1070" y1="125" x2="1140" y2="100"/>
    <line x1="1070" y1="125" x2="1140" y2="150"/>
    <line x1="1070" y1="165" x2="1140" y2="150"/>
