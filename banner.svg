<svg width="1200" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="40%" style="stop-color:#0a1628"/>
      <stop offset="70%" style="stop-color:#0d1f3c"/>
      <stop offset="100%" style="stop-color:#1a0a3a"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="60%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#00d9ff"/>
    </linearGradient>
    <linearGradient id="nameGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.035" stroke="#00d9ff" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
    <line x1="800" y1="0" x2="800" y2="200"/>
    <line x1="900" y1="0" x2="900" y2="200"/>
    <line x1="1000" y1="0" x2="1000" y2="200"/>
    <line x1="1100" y1="0" x2="1100" y2="200"/>
  </g>

  <!-- Neural net LEFT connections -->
  <g stroke="#00d9ff" stroke-width="0.6" opacity="0.12">
    <line x1="60" y1="50" x2="130" y2="35"/>
    <line x1="60" y1="50" x2="130" y2="80"/>
    <line x1="60" y1="50" x2="130" y2="125"/>
    <line x1="60" y1="100" x2="130" y2="35"/>
    <line x1="60" y1="100" x2="130" y2="80"/>
    <line x1="60" y1="100" x2="130" y2="125"/>
    <line x1="60" y1="100" x2="130" y2="165"/>
    <line x1="60" y1="150" x2="130" y2="80"/>
    <line x1="60" y1="150" x2="130" y2="125"/>
    <line x1="60" y1="150" x2="130" y2="165"/>
    <line x1="130" y1="35" x2="200" y2="60"/>
    <line x1="130" y1="80" x2="200" y2="60"/>
    <line x1="130" y1="80" x2="200" y2="110"/>
    <line x1="130" y1="125" x2="200" y2="110"/>
    <line x1="130" y1="125" x2="200" y2="155"/>
    <line x1="130" y1="165" x2="200" y2="155"/>
  </g>
