  <circle cx="60" cy="50" r="3.5" fill="#00d9ff" opacity="0.65"/>
  <circle cx="60" cy="100" r="3.5" fill="#00d9ff" opacity="0.65"/>
  <circle cx="60" cy="150" r="3.5" fill="#00d9ff" opacity="0.65"/>
  <circle cx="130" cy="35" r="3.5" fill="#7c3aed" opacity="0.75"/>
  <circle cx="130" cy="80" r="3.5" fill="#7c3aed" opacity="0.75"/>
