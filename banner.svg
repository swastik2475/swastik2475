  <circle cx="130" cy="165" r="3.5" fill="#7c3aed" opacity="0.75"/>
  <circle cx="200" cy="60" r="3.5" fill="#00d9ff" opacity="0.55"/>
  <circle cx="200" cy="110" r="3.5" fill="#00d9ff" opacity="0.55"/>
  <circle cx="200" cy="155" r="3.5" fill="#00d9ff" opacity="0.55"/>

